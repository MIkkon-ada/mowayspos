name: CLOUD P1B2A production runtime gate

on:
  workflow_dispatch:
  push:
    branches:
      - cloud-p1b2a-cvm-production-runtime-config
  pull_request:
    paths:
      - .github/workflows/cloud-p1b2a-gate.yml
      - .env.production.example
      - Dockerfile.backend
      - Dockerfile.frontend
      - docker-compose.prod.yml
      - nginx.conf
      - bowei_ai_dashboard/app/routers/llm_config.py
      - bowei_ai_dashboard/app/routers/transcribe.py
      - bowei_ai_dashboard/requirements.txt
      - bowei_ai_dashboard/tests/test_production_runtime_contract.py
      - bowei_ai_dashboard/tests/test_production_runtime_security.py
      - docs/production-runtime-contract.md
      - .github/workflows/cloud-p1b2b-a-ghcr-private-publish.yml
      - bowei_ai_dashboard/tests/test_ghcr_private_publish_contract.py
      - docs/ghcr-private-image-publish.md

permissions:
  contents: read

jobs:
  production-runtime-gate:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      COMPOSE_PROJECT_NAME: mowayspos-p1b2a-gate
      MOWAYS_IMAGE_TAG: ci-${{ github.sha }}
      POSTGRES_DB: mowayspos_gate
      POSTGRES_USER: mowayspos_gate
      DB_PASSWORD: p1b2a_ci_url_safe_password
      SESSION_COOKIE_NAME: moways_ci_session
      CI_FAKE_LLM_KEY: p1b2a_ci_environment_only_key

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: bowei_ai_dashboard/requirements.txt

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r bowei_ai_dashboard/requirements.txt
          python -m pip install pytest==9.0.3

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies with lockfile
        working-directory: frontend
        run: npm ci

      - name: Prepare isolated runtime
        shell: bash
        run: |
          set -euo pipefail

          runtime_root="$RUNNER_TEMP/moways-p1b2a-runtime"
          env_file="$runtime_root/env/production.env"
          echo "MOWAYS_DATA_ROOT=$runtime_root" >> "$GITHUB_ENV"
          echo "MOWAYS_ENV_FILE=$env_file" >> "$GITHUB_ENV"
          MOWAYS_DATA_ROOT="$runtime_root"
          MOWAYS_ENV_FILE="$env_file"

          if ss -ltnH 'sport = :18100' | grep -q .; then
            echo 'Port 18100 is already occupied.' >&2
            exit 1
          fi

          for container in mowayspos-postgres mowayspos-backend mowayspos-frontend; do
            if docker ps -a --format '{{.Names}}' | grep -Fxq "$container"; then
              echo "Unexpected pre-existing container: $container" >&2
              exit 1
            fi
          done

          if docker network ls --format '{{.Name}}' | grep -Fxq mowayspos_app; then
            echo 'Unexpected pre-existing network: mowayspos_app' >&2
            exit 1
          fi

          touch "$RUNNER_TEMP/moways-p1b2a-owned"
          mkdir -p \
            "$MOWAYS_DATA_ROOT/postgres" \
            "$MOWAYS_DATA_ROOT/env" \
            "$MOWAYS_DATA_ROOT/uploads" \
            "$MOWAYS_DATA_ROOT/backups" \
            "$MOWAYS_DATA_ROOT/logs"

          cat > "$MOWAYS_ENV_FILE" <<EOF
          MOWAYS_IMAGE_TAG=$MOWAYS_IMAGE_TAG
          MOWAYS_DATA_ROOT=$MOWAYS_DATA_ROOT
          MOWAYS_ENV_FILE=$MOWAYS_ENV_FILE
          POSTGRES_DB=$POSTGRES_DB
          POSTGRES_USER=$POSTGRES_USER
          DB_PASSWORD=$DB_PASSWORD
          DATABASE_URL=postgresql+psycopg://$POSTGRES_USER:$DB_PASSWORD@postgres:5432/$POSTGRES_DB
          APP_ENV=production
          FRONTEND_ORIGIN=https://pos.moways.com.cn
          CORS_ALLOWED_ORIGINS=https://pos.moways.com.cn
          SESSION_COOKIE_NAME=$SESSION_COOKIE_NAME
          SESSION_COOKIE_SECURE=true
          SESSION_COOKIE_SAMESITE=lax
          SESSION_TTL_DAYS=7
          LOG_LEVEL=INFO
          ALLOW_FILE_SECRET_FALLBACK=false
          ALLOW_LEGACY_PASSWORD_LOGIN=false
          BOWEI_DEV_MODE=false
          ALLOW_DEV_SCHEMA_CREATE_ALL=
          ALLOW_PROTECTED_DATABASE_MIGRATION=
          ANTHROPIC_API_KEY=
          ANTHROPIC_BASE_URL=
          ANTHROPIC_MODEL=
          DASHSCOPE_API_KEY=
          DASHSCOPE_BASE_URL=
          DASHSCOPE_MODEL=
          DEEPSEEK_API_KEY=$CI_FAKE_LLM_KEY
          DEEPSEEK_BASE_URL=https://api.deepseek.com
          DEEPSEEK_MODEL=deepseek-chat
          ZHIPUAI_API_KEY=
          ZHIPUAI_BASE_URL=
          ZHIPUAI_MODEL=
          EOF

          printf '{}\n' > "$MOWAYS_DATA_ROOT/env/llm_configs.json"
          chmod 600 "$MOWAYS_ENV_FILE" "$MOWAYS_DATA_ROOT/env/llm_configs.json"

      - name: Compile backend
        run: python -m compileall bowei_ai_dashboard/app

      - name: P1B2A production runtime tests
        working-directory: bowei_ai_dashboard
        run: >-
          python -m pytest
          tests/test_production_runtime_contract.py
          tests/test_production_runtime_security.py
          -q

      - name: Authentication and database safety regression
        working-directory: bowei_ai_dashboard
        run: >-
          python -m pytest
          tests/test_auth_import_contract.py
          tests/test_database_safety_gate.py
          tests/test_alembic_database_safety.py
          -q

      - name: Session cookie and production LLM key contracts
        working-directory: bowei_ai_dashboard
        run: python -m pytest tests/test_production_runtime_security.py -q

      - name: Backend full pytest with known structural baseline
        working-directory: bowei_ai_dashboard
        shell: bash
        run: |
          set -uo pipefail
          log="$RUNNER_TEMP/backend-pytest.log"
          set +e
          python -m pytest tests -q --tb=no 2>&1 | tee "$log"
          pytest_code=${PIPESTATUS[0]}
          set -e

