name: CLOUD P1B2B-A private GHCR image publish

on:
  workflow_dispatch:
    inputs:
      operation:
        description: Run a local-only audit or the complete private publish flow
        required: true
        type: choice
        options:
          - audit
          - publish
        default: audit

permissions:
  contents: read

concurrency:
  group: cloud-p1b2b-a-ghcr-private-image-publish
  cancel-in-progress: false

jobs:
  private-image-publish:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    env:
      BACKEND_REPOSITORY: ghcr.io/mikkon-ada/mowayspos-backend
      FRONTEND_REPOSITORY: ghcr.io/mikkon-ada/mowayspos-frontend
      POSTGRES_REPOSITORY: ghcr.io/mikkon-ada/mowayspos-postgres
      POSTGRES_UPSTREAM_REPOSITORY: docker.io/library/postgres
      POSTGRES_UPSTREAM: docker.io/library/postgres:16-alpine
      BACKEND_LOCAL: mowayspos-publish-backend:${{ github.sha }}
      FRONTEND_LOCAL: mowayspos-publish-frontend:${{ github.sha }}
      POSTGRES_LOCAL: mowayspos-publish-postgres-linux-amd64

    steps:
      - name: Checkout exact revision
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          persist-credentials: false

      - name: Validate main branch and full commit SHA
        shell: bash
        run: |
          set -euo pipefail
          if [[ "$GITHUB_REF" != "refs/heads/main" ]]; then
            echo "Manual publishing is restricted to refs/heads/main." >&2
            exit 1
          fi
          if [[ ! "$GITHUB_SHA" =~ ^[0-9a-f]{40}$ ]]; then
            echo "A full 40-character commit SHA is required." >&2
            exit 1
          fi
          if [[ "$(git rev-parse HEAD)" != "$GITHUB_SHA" ]]; then
            echo "Checked-out revision does not match the workflow revision." >&2
            exit 1
          fi
          echo "publish_sha=$GITHUB_SHA"

      - name: Validate operation mode
        shell: bash
        env:
          OPERATION: ${{ inputs.operation }}
        run: |
          set -euo pipefail
          case "$OPERATION" in
            "audit"|"publish") ;;
            *)
              echo "Unsupported operation. Expected audit or publish." >&2
              exit 1
              ;;
          esac
          echo "operation=$OPERATION"

      - name: Build local backend and frontend images
        shell: bash
        run: |
          set -euo pipefail
          docker build --pull --no-cache -f Dockerfile.backend -t "$BACKEND_LOCAL" .
          docker build --pull --no-cache -f Dockerfile.frontend -t "$FRONTEND_LOCAL" .
          echo "local_builds=ok"

      - name: Resolve PostgreSQL upstream index and linux/amd64 manifest
        shell: bash
        run: |
          set -euo pipefail
          index_manifest="$RUNNER_TEMP/postgres-upstream-index.json"
          POSTGRES_UPSTREAM_INDEX_DIGEST=$(docker buildx imagetools inspect "$POSTGRES_UPSTREAM" \
            --format '{{.Manifest.Digest}}')
          if [[ ! "$POSTGRES_UPSTREAM_INDEX_DIGEST" =~ ^sha256:[0-9a-f]{64}$ ]]; then
            echo "Unable to resolve a valid PostgreSQL upstream index digest." >&2
            exit 1
          fi

          docker buildx imagetools inspect \
            --raw "$POSTGRES_UPSTREAM_REPOSITORY@$POSTGRES_UPSTREAM_INDEX_DIGEST" \
            > "$index_manifest"
          amd64_match_count=$(jq '[
            .manifests[]?
            | select(
                .platform.os == "linux"
                and .platform.architecture == "amd64"
              )
          ] | length' "$index_manifest")
          if [[ "$amd64_match_count" != "1" ]]; then
            echo "PostgreSQL index must contain exactly one linux/amd64 manifest." >&2
            exit 1
          fi
          POSTGRES_AMD64_DIGEST=$(jq -er '[
            .manifests[]
            | select(
                .platform.os == "linux"
                and .platform.architecture == "amd64"
              )
            | .digest
          ][0]' "$index_manifest")
          if [[ ! "$POSTGRES_AMD64_DIGEST" =~ ^sha256:[0-9a-f]{64}$ ]]; then
            echo "PostgreSQL linux/amd64 manifest has an invalid digest." >&2
            exit 1
          fi

          POSTGRES_TAG="linux-amd64-sha256-${POSTGRES_AMD64_DIGEST#sha256:}"
          POSTGRES_TARGET="$POSTGRES_REPOSITORY:$POSTGRES_TAG"
          echo "POSTGRES_UPSTREAM_INDEX_DIGEST=$POSTGRES_UPSTREAM_INDEX_DIGEST" >> "$GITHUB_ENV"
          echo "POSTGRES_AMD64_DIGEST=$POSTGRES_AMD64_DIGEST" >> "$GITHUB_ENV"
          echo "POSTGRES_TAG=$POSTGRES_TAG" >> "$GITHUB_ENV"
          echo "POSTGRES_TARGET=$POSTGRES_TARGET" >> "$GITHUB_ENV"
          echo "postgres_upstream_index_digest=$POSTGRES_UPSTREAM_INDEX_DIGEST"
          echo "postgres_linux_amd64_digest=$POSTGRES_AMD64_DIGEST"
          echo "postgres_target=$POSTGRES_TARGET"

      - name: Pull immutable PostgreSQL linux/amd64 image
        shell: bash
        run: |
          set -euo pipefail
          docker pull --platform linux/amd64 \
            "$POSTGRES_UPSTREAM_REPOSITORY@$POSTGRES_AMD64_DIGEST" >/dev/null
          docker tag \
            "$POSTGRES_UPSTREAM_REPOSITORY@$POSTGRES_AMD64_DIGEST" \
            "$POSTGRES_LOCAL"
          echo "postgres_linux_amd64_pull=ok"

      - name: Set up pinned Go toolchain for binary analysis
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16
        with:
          go-version: '1.26.5'
          cache: false

      - name: Verify PostgreSQL gosu binary identity
        shell: bash
        run: |
          set -euo pipefail
          gosu_binary="$RUNNER_TEMP/postgres-gosu"
          gosu_container=$(docker create --platform linux/amd64 "$POSTGRES_LOCAL")
          trap 'docker rm -f "$gosu_container" >/dev/null 2>&1 || true' EXIT
          docker cp "$gosu_container:/usr/local/bin/gosu" "$gosu_binary"
          docker rm -f "$gosu_container" >/dev/null
          trap - EXIT

          test -f "$gosu_binary"
          test -x "$gosu_binary"
          gosu_sha256=$(sha256sum "$gosu_binary" | awk '{print $1}')
          expected_sha256=52c8749d0142edd234e9d6bd5237dff2d81e71f43537e2f4f66f75dd4b243dd0
          if [[ "$gosu_sha256" != "$expected_sha256" ]]; then
            echo "PostgreSQL gosu binary SHA256 did not match the reviewed image." >&2
            exit 1
          fi

          gosu_version_output=$("$gosu_binary" --version)
          read -r gosu_version gosu_go_token _ gosu_platform_token _ <<< "$gosu_version_output"
          gosu_go_version=${gosu_go_token#(}
          gosu_platform=${gosu_platform_token%;}
          build_info=$(go version -m "$gosu_binary")
          build_go_version=$(awk 'NR == 1 {print $2}' <<< "$build_info")
          build_goos=$(awk '$1 == "build" && $2 ~ /^GOOS=/ {sub(/^GOOS=/, "", $2); print $2}' <<< "$build_info")
          build_goarch=$(awk '$1 == "build" && $2 ~ /^GOARCH=/ {sub(/^GOARCH=/, "", $2); print $2}' <<< "$build_info")
          build_platform="$build_goos/$build_goarch"

          [[ "$gosu_version" == "1.19" ]]
          [[ "$gosu_go_version" == "go1.24.6" ]]
          [[ "$gosu_platform" == "linux/amd64" ]]
          [[ "$build_go_version" == "$gosu_go_version" ]]
          [[ "$build_platform" == "$gosu_platform" ]]

          echo "gosu_version=$gosu_version"
          echo "gosu_go_version=$gosu_go_version"
          echo "gosu_platform=$gosu_platform"
          echo "gosu_sha256=$gosu_sha256"
          echo "gosu_identity=verified"

      - name: Verify PostgreSQL gosu binary vulnerability reachability
        shell: bash
        run: |
          set -euo pipefail
          gosu_binary="$RUNNER_TEMP/postgres-gosu"
          govulncheck_root="$RUNNER_TEMP/postgres-govulncheck-bin"
          govulncheck_report="$RUNNER_TEMP/postgres-gosu-govulncheck.json"
          govulncheck_error="$RUNNER_TEMP/postgres-gosu-govulncheck-error"
          mkdir -p "$govulncheck_root"
          GOBIN="$govulncheck_root" \
            go install golang.org/x/vuln/cmd/govulncheck@v1.6.0
          if ! "$govulncheck_root/govulncheck" -mode binary -json "$gosu_binary" \
            > "$govulncheck_report" 2> "$govulncheck_error"; then
            echo "gosu_govulncheck=failed" >&2
            exit 1
          fi

          python - "$govulncheck_report" <<'PY'
          import json
          import sys
          from pathlib import Path

          expected_cves = {
              "CVE-2025-68121",
              "CVE-2025-61726",
              "CVE-2025-61729",
              "CVE-2026-25679",
              "CVE-2026-27145",
              "CVE-2026-32280",
              "CVE-2026-32281",
              "CVE-2026-32283",
              "CVE-2026-33811",
              "CVE-2026-33814",
              "CVE-2026-39820",
              "CVE-2026-39822",
              "CVE-2026-39836",
              "CVE-2026-42499",
              "CVE-2026-42504",
          }
          aliases_by_osv: dict[str, set[str]] = {}
          findings: list[dict[str, object]] = []

          report = Path(sys.argv[1])
          try:
              with report.open(encoding="utf-8") as stream:
                  for line in stream:
                      if not line.strip():
                          continue
                      message = json.loads(line)
                      osv = message.get("osv") or {}
                      if osv:
                          osv_id = str(osv.get("id") or "").strip()
                          if osv_id:
                              aliases_by_osv[osv_id] = {
                                  str(alias).strip()
                                  for alias in osv.get("aliases") or []
                                  if str(alias).strip()
                              }
                      finding = message.get("finding")
                      if finding:
                          findings.append(finding)
          except (OSError, json.JSONDecodeError, TypeError, ValueError):
              print("gosu_govulncheck_report=invalid", file=sys.stderr)
              raise SystemExit(1)

          observed_cves = {
              alias
              for aliases in aliases_by_osv.values()
              for alias in aliases
              if alias.startswith("CVE-")
          }
          missing_cves = sorted(expected_cves - observed_cves)
          if missing_cves:
              print(
                  "gosu_vulndb_missing=" + ",".join(missing_cves),
                  file=sys.stderr,
              )
              raise SystemExit(1)
          print("gosu_vulndb_coverage=15/15")

          def sanitized(value: object) -> str:
              text = str(value or "unknown")
              return "".join(
                  character
                  if character.isprintable() and not character.isspace()
                  else "_"
                  for character in text
              )

          records = set()
          for finding in findings:
              trace = finding.get("trace") or []
              if not trace:
                  continue
              symbol = str((trace[0] or {}).get("function") or "").strip()
              if not symbol:
                  continue
              osv_id = str(finding.get("osv") or "unknown").strip()
              aliases = ",".join(
                  sorted(
                      alias
                      for alias in aliases_by_osv.get(osv_id, set())
                      if alias.startswith("CVE-")
                  )
              ) or "none"
              fixed = str(finding.get("fixed_version") or "none").strip()
              records.add(
                  (
                      sanitized(osv_id),
                      sanitized(aliases),
                      sanitized(symbol),
                      sanitized(fixed),
                  )
              )

          print(f"gosu_reachable_vulnerability_count={len(records)}")
          for record in sorted(records):
              osv_id, aliases, symbol, fixed = record
              print(
                  f"gosu_reachable_vulnerability id={osv_id} "
                  f"aliases={aliases} symbol={symbol} fixed={fixed}"
              )
          if records:
              raise SystemExit(1)
          print("gosu_binary_reachability=clear")
          PY

      - name: Scan backend image for secrets
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25
        with:
          scan-type: image
          image-ref: ${{ env.BACKEND_LOCAL }}
          scanners: secret
          format: json
          output: ${{ runner.temp }}/backend-secret.json
          exit-code: '0'

      - name: Scan frontend image for secrets
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25
        with:
          scan-type: image
          image-ref: ${{ env.FRONTEND_LOCAL }}
          scanners: secret
          format: json
          output: ${{ runner.temp }}/frontend-secret.json
          exit-code: '0'

      - name: Scan PostgreSQL image for secrets
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25
        with:
          scan-type: image
          image-ref: ${{ env.POSTGRES_LOCAL }}
          scanners: secret
          format: json
          output: ${{ runner.temp }}/postgres-secret.json
          exit-code: '0'

      - name: Scan backend image for fixable vulnerabilities
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25
        with:
          scan-type: image
          image-ref: ${{ env.BACKEND_LOCAL }}
          scanners: vuln
          vuln-type: os,library
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          format: json
          output: ${{ runner.temp }}/backend-vulnerability.json
          exit-code: '0'

      - name: Scan frontend image for fixable vulnerabilities
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25
        with:
          scan-type: image
          image-ref: ${{ env.FRONTEND_LOCAL }}
          scanners: vuln
          vuln-type: os,library
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          format: json
          output: ${{ runner.temp }}/frontend-vulnerability.json
          exit-code: '0'

      - name: Scan PostgreSQL image for fixable vulnerabilities
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25
        with:
          scan-type: image
          image-ref: ${{ env.POSTGRES_LOCAL }}
          scanners: vuln
          vuln-type: os,library
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          format: json
          output: ${{ runner.temp }}/postgres-vulnerability.json
          exit-code: '0'

      - name: Inspect image contents and Docker history
        shell: bash
        run: |
          set -euo pipefail

          if ! docker run --rm --entrypoint sh "$BACKEND_LOCAL" -c '
            set -eu
            test ! -e /app/.env
            test ! -e /app/.git
            test ! -e /app/.docker/config.json
            ! find /app -type d \( -name uploads -o -name backups -o -name logs \) -print -quit | grep -q .
            ! find /app -type f \( -name production.env -o -path "*/.docker/config.json" \) -print -quit | grep -q .
            ! find /app -type f \( -name "*.db" -o -name "*.sqlite" -o -name "*.sqlite3" \) -print -quit | grep -q .
            ! find /app -type f \( -name "*.pem" -o -name "*.key" -o -name "id_rsa" -o -name "id_ed25519" \) -print -quit | grep -q .
          '; then
            echo "backend image content check failed: forbidden local data, Docker configuration, database, or private key." >&2
            exit 1
          fi

          if ! docker run --rm --entrypoint sh "$FRONTEND_LOCAL" -c '
            set -eu
            test ! -e /usr/share/nginx/html/frontend/src
            test ! -e /usr/share/nginx/html/src
            test ! -e /usr/share/nginx/html/node_modules
            test ! -e /usr/share/nginx/html/.env
            test ! -e /usr/share/nginx/html/.git
            test ! -e /usr/share/nginx/html/.docker/config.json
            ! find /usr/share/nginx/html -type f \( -name "*.pem" -o -name "*.key" -o -name "id_rsa" -o -name "id_ed25519" \) -print -quit | grep -q .
          '; then
            echo "frontend image content check failed: source, dependency, Docker configuration, token material, or private key." >&2
            exit 1
          fi

          if ! docker run --rm --entrypoint sh "$POSTGRES_LOCAL" -c '
            set -eu
            test ! -e /app
            test ! -e /workspace
            test ! -e /mowayspos
            test ! -e /root/.docker/config.json
            ! find / -xdev -type f \( -name "production.env" -o -name "*.pem" -o -name "id_rsa" -o -name "id_ed25519" \) -print -quit 2>/dev/null | grep -q .
          '; then
            echo "postgres image content check failed: project code, production secret, Docker configuration, or private key." >&2
            exit 1
          fi

          for image in "$BACKEND_LOCAL" "$FRONTEND_LOCAL" "$POSTGRES_LOCAL"; do
            labels=$(docker image inspect "$image" --format '{{json .Config.Labels}}')
            if grep -Fqi 'org.opencontainers.image.source' <<<"$labels"; then
              echo "Image source association label is forbidden." >&2
              exit 1
            fi
            if docker history --no-trunc --format '{{.CreatedBy}}' "$image" \
              | grep -Eqi '(ghcr_publish_token|github_token|authorization|api[_-]?key|password|passwd|token|llm|tencent|secret|--build-arg[^|]*(token|password|secret|key))'; then
              echo "Docker history check failed: possible token, password, LLM/cloud credential, authorization value, or non-empty secret build argument." >&2
              exit 1
            fi
          done
          echo "image_content_and_history=ok"

      - name: Enforce sanitized scan results
        shell: bash
        run: |
          set -euo pipefail
          python - "$RUNNER_TEMP" <<'PY'
          import json
          import sys
          from pathlib import Path

          root = Path(sys.argv[1])
          failed = False
          for image in ("backend", "frontend", "postgres"):
              secret_file = root / f"{image}-secret.json"
              vulnerability_file = root / f"{image}-vulnerability.json"
              for results_file in (secret_file, vulnerability_file):
                  if not results_file.is_file():
                      print(f"{image}_scan_result=missing", file=sys.stderr)
                      failed = True

              if not secret_file.is_file() or not vulnerability_file.is_file():
                  continue

              secret_data = json.loads(secret_file.read_text(encoding="utf-8"))
              vulnerability_data = json.loads(
                  vulnerability_file.read_text(encoding="utf-8")
              )
              secret_findings = sum(
                  len(result.get("Secrets") or [])
                  for result in secret_data.get("Results") or []
              )

              def sanitized(value: object) -> str:
                  text = str(value or "unknown")
                  return "".join(
                      character
                      if character.isprintable() and not character.isspace()
                      else "_"
                      for character in text
                  )

              records = set()
              for result in vulnerability_data.get("Results") or []:
                  for item in result.get("Vulnerabilities") or []:
                      if item.get("Severity") in {"HIGH", "CRITICAL"} and bool(
                          (item.get("FixedVersion") or "").strip()
                      ):
                          records.add(
                              (
                                  image,
                                  sanitized(item.get("Severity")),
                                  sanitized(item.get("VulnerabilityID")),
                                  sanitized(item.get("PkgName")),
                                  sanitized(item.get("InstalledVersion")),
                                  sanitized(item.get("FixedVersion")),
                              )
                          )

              for record in sorted(records):
                  (
                      image,
                      severity,
                      vulnerability_id,
                      package_name,
                      installed_version,
                      fixed_version,
                  ) = record
                  print(
                      "vulnerability "
                      f"image={image} "
                      f"severity={severity} "
                      f"id={vulnerability_id} "
                      f"package={package_name} "
                      f"installed={installed_version} "
                      f"fixed={fixed_version}"
                  )

              fixable_vulnerabilities = len(records)
              print(f"{image}_secret_findings={secret_findings}")
              print(
                  f"{image}_fixable_high_critical="
                  f"{fixable_vulnerabilities}"
              )
              if secret_findings:
                  print(f"Secret scan failed for {image}.", file=sys.stderr)
                  failed = True
              if fixable_vulnerabilities:
                  print(
                      "Fixable HIGH/CRITICAL vulnerabilities found "
                      f"in {image}.",
                      file=sys.stderr,
                  )
                  failed = True

          if failed:
              raise SystemExit(1)
          PY

      - name: Report audit-only success
        if: ${{ inputs.operation == 'audit' }}
        shell: bash
        run: |
          set -euo pipefail
          echo "audit_only=ok"
          echo "publish_attempted=false"

      - name: Log in to GHCR after all gates pass
        if: ${{ inputs.operation == 'publish' }}
        uses: docker/login-action@74a5d142397b4f367a81961eba4e8cd7edddf772
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GHCR_PUBLISH_TOKEN }}

      - name: Check immutable tags before publishing
        if: ${{ inputs.operation == 'publish' }}
        shell: bash
        run: |
          set -euo pipefail
          manifest_error="$RUNNER_TEMP/manifest-inspect-error"

          require_absent() {
            local ref="$1"
            if docker buildx imagetools inspect "$ref" >/dev/null 2>"$manifest_error"; then
              echo "Refusing to overwrite existing immutable tag: $ref" >&2
              exit 1
            fi
            if ! grep -Eqi '(not found|manifest unknown|name unknown)' "$manifest_error"; then
              echo "Unable to verify immutable tag absence for $ref." >&2
              exit 1
            fi
            rm -f "$manifest_error"
          }

          BACKEND_TARGET="$BACKEND_REPOSITORY:$GITHUB_SHA"
          FRONTEND_TARGET="$FRONTEND_REPOSITORY:$GITHUB_SHA"
          echo "BACKEND_TARGET=$BACKEND_TARGET" >> "$GITHUB_ENV"
          echo "FRONTEND_TARGET=$FRONTEND_TARGET" >> "$GITHUB_ENV"
          require_absent "$BACKEND_TARGET"
          require_absent "$FRONTEND_TARGET"

          if remote_digest=$(docker buildx imagetools inspect "$POSTGRES_TARGET" \
            --format '{{.Manifest.Digest}}' 2>"$manifest_error"); then
            if [[ "$remote_digest" != "$POSTGRES_AMD64_DIGEST" ]]; then
              echo "Existing PostgreSQL immutable tag has a mismatched digest." >&2
              exit 1
            fi
            echo "POSTGRES_SHOULD_PUSH=false" >> "$GITHUB_ENV"
            echo "postgres_remote_digest=$remote_digest"
          elif grep -Eqi '(not found|manifest unknown|name unknown)' "$manifest_error"; then
            echo "POSTGRES_SHOULD_PUSH=true" >> "$GITHUB_ENV"
            echo "postgres_immutable_tag=absent"
          else
            echo "Unable to verify the PostgreSQL immutable tag." >&2
            exit 1
          fi
          rm -f "$manifest_error"

      - name: Retag validated images
        if: ${{ inputs.operation == 'publish' }}
        shell: bash
        run: |
          set -euo pipefail
          docker tag "$BACKEND_LOCAL" "$BACKEND_TARGET"
          docker tag "$FRONTEND_LOCAL" "$FRONTEND_TARGET"
          if [[ "$POSTGRES_SHOULD_PUSH" == "true" ]]; then
            docker tag "$POSTGRES_LOCAL" "$POSTGRES_TARGET"
          fi
          echo "immutable_retag=ok"

      - name: Push immutable images
        if: ${{ inputs.operation == 'publish' }}
        shell: bash
        run: |
          set -euo pipefail
          docker push --quiet "$BACKEND_TARGET" >/dev/null
          docker push --quiet "$FRONTEND_TARGET" >/dev/null
          if [[ "$POSTGRES_SHOULD_PUSH" == "true" ]]; then
            docker push --quiet "$POSTGRES_TARGET" >/dev/null
          fi
          echo "immutable_pushes=ok"

      - name: Verify remote image digests
        if: ${{ inputs.operation == 'publish' }}
        shell: bash
        run: |
          set -euo pipefail
          verify_pushed_digest() {
            local ref="$1"
            local expected
            local remote
            expected=$(docker image inspect "$ref" \
              --format '{{range .RepoDigests}}{{println .}}{{end}}' \
              | awk -F@ -v repo="${ref%:*}" '$1 == repo {print $2; exit}')
            remote=$(docker buildx imagetools inspect "$ref" --format '{{.Manifest.Digest}}')
            if [[ ! "$remote" =~ ^sha256:[0-9a-f]{64}$ || "$remote" != "$expected" ]]; then
              echo "Remote digest verification failed for ${ref%:*}." >&2
              exit 1
            fi
            echo "verified_image=${ref%:*} digest=$remote"
          }

          verify_pushed_digest "$BACKEND_TARGET"
          verify_pushed_digest "$FRONTEND_TARGET"
          postgres_remote=$(docker buildx imagetools inspect "$POSTGRES_TARGET" --format '{{.Manifest.Digest}}')
          if [[ "$postgres_remote" != "$POSTGRES_AMD64_DIGEST" ]]; then
            echo "Remote PostgreSQL digest verification failed." >&2
            exit 1
          fi
          echo "postgres_remote_digest=$postgres_remote"
          echo "verified_image=$POSTGRES_REPOSITORY digest=$postgres_remote"

      - name: Verify GHCR packages are private
        if: ${{ inputs.operation == 'publish' }}
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GHCR_PUBLISH_TOKEN }}
        run: |
          set -euo pipefail
          owner=mikkon-ada
          for package in mowayspos-backend mowayspos-frontend mowayspos-postgres; do
            visibility=$(gh api "/users/$owner/packages/container/$package" --jq '.visibility')
            test "$visibility" = "private"
            echo "package=$package visibility=private"
          done

      - name: Cleanup publish credentials and temporary images
        if: always()
        shell: bash
        run: |
          set -u
          docker logout ghcr.io >/dev/null 2>&1 || true
          rm -f -- \
            "$RUNNER_TEMP/backend-secret.json" \
            "$RUNNER_TEMP/frontend-secret.json" \
            "$RUNNER_TEMP/postgres-secret.json" \
            "$RUNNER_TEMP/backend-vulnerability.json" \
            "$RUNNER_TEMP/frontend-vulnerability.json" \
            "$RUNNER_TEMP/postgres-vulnerability.json" \
            "$RUNNER_TEMP/postgres-upstream-index.json" \
            "$RUNNER_TEMP/postgres-gosu" \
            "$RUNNER_TEMP/postgres-gosu-govulncheck.json" \
            "$RUNNER_TEMP/postgres-gosu-govulncheck-error" \
            "$RUNNER_TEMP/manifest-inspect-error"
          rm -rf -- "$RUNNER_TEMP/postgres-govulncheck-bin"
          refs=("$BACKEND_LOCAL" "$FRONTEND_LOCAL" "$POSTGRES_LOCAL")
          if [[ -n "${POSTGRES_AMD64_DIGEST:-}" ]]; then
            refs+=("$POSTGRES_UPSTREAM_REPOSITORY@$POSTGRES_AMD64_DIGEST")
          fi
          for candidate in \
            "${BACKEND_TARGET:-}" \
            "${FRONTEND_TARGET:-}" \
            "${POSTGRES_TARGET:-}"; do
            if [[ -n "$candidate" ]]; then
              refs+=("$candidate")
            fi
          done
          docker image rm "${refs[@]}" >/dev/null 2>&1 || true
          echo "publish_cleanup=ok"
