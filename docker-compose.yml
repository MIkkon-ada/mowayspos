services:
  postgres:
    image: postgres:16-alpine
    container_name: bowei-postgres
    environment:
      POSTGRES_DB: bowei_ai_dashboard
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - bowei_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d bowei_ai_dashboard"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  bowei_postgres_data:
